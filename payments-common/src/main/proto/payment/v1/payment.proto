syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.payment";

message PaymentInitiatedEvent {
  int64 payment_id = 1;
  int64 payer_id = 2;
  int64 payee_id = 3;
  double amount = 4;
  string currency = 5;
  string idempotency_key = 6;
}

message PaymentRiskEvaluatedEvent {
  int64 payment_id = 1;
  string status = 2; // "APPROVED", "REJECTED", "PENDING_REVIEW"
  int32 risk_score = 3;
  string reason = 4;
}

message PaymentSettledEvent {
  int64 payment_id = 1;
  int64 payee_id = 2;
  double settled_amount = 3;
}
