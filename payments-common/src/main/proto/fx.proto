syntax = "proto3";

package com.example.payments.fx;

option java_multiple_files = true;
option java_package = "com.example.payments.fx.grpc";

service FxService {
  rpc ProcessFx (FxRequest) returns (FxResponse);
}

message FxRequest {
  int64 payment_id = 1;
  string source_currency = 2;
  string target_currency = 3;
  string amount = 4;
}

message FxResponse {
  bool success = 1;
  string converted_amount = 2;
  string target_currency = 3;
  string exchange_rate = 4;
}
