syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.wallet";

service WalletService {
  rpc Debit (DebitRequest) returns (DebitResponse);
}

message DebitRequest {
  int64 payment_id = 1;
  double amount = 2;
  string currency = 3;
}

message DebitResponse {
  string status = 1;
  string reference_id = 2;
}

message ReserveFundsCommand {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  double amount = 3;
  string type = 4; // "BASE" or "FEE"
}

message FundsReservedEvent {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  double amount = 3;
  string type = 4;
}

message FundsReservationFailedEvent {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  string reason = 3;
}

message UnreserveFundsCommand {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  double amount = 3;
  string type = 4;
}
