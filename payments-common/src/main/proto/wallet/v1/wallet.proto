syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.wallet";

message ReserveFundsCommand {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  double amount = 3;
  string type = 4; // "BASE" or "FEE"
  string currency = 5;
}

message FundsReservedEvent {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  double amount = 3;
  string type = 4;
  string currency = 5;
}

message FundsReservationFailedEvent {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  string reason = 3;
  string currency = 4;
}

message UnreserveFundsCommand {
  int64 payment_id = 1;
  int64 wallet_id = 2;
  double amount = 3;
  string type = 4;
  string currency = 5;
}
