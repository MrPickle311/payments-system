syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.sanctions";

service SanctionsService {
  rpc CheckSanctions (CheckSanctionsRequest) returns (CheckSanctionsResponse);
}

message CheckSanctionsRequest {
  int64 payment_id = 1;
}

message CheckSanctionsResponse {
  bool passed = 1;
}
