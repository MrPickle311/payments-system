syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.fee";

service FeeService {
  rpc CalculateFee (CalculateFeeRequest) returns (CalculateFeeResponse);
  rpc SaveSettlement (SaveSettlementRequest) returns (SaveSettlementResponse);
  rpc GetFee (GetFeeRequest) returns (GetFeeResponse);
}

message CalculateFeeRequest {
  int64 payment_id = 1;
  double amount = 2;
  string currency = 3;
}

message CalculateFeeResponse {
  double gross_amount = 1;
  double percentage_fee = 2;
  double flat_fee = 3;
  double total_fee = 4;
  double net_amount = 5;
  string currency = 6;
}

message SaveSettlementRequest {
  int64 payment_id = 1;
  double amount = 2;
  string currency = 3;
}

message SaveSettlementResponse {
  bool saved = 1;
}

message GetFeeRequest {
  int64 payment_id = 1;
}

message GetFeeResponse {
  int64 id = 1;
  int64 payment_id = 2;
  double gross_amount = 3;
  double percentage_fee = 4;
  double flat_fee = 5;
  double total_fee = 6;
  double net_amount = 7;
  string currency = 8;
}

message CalculateFeeCommand {
  int64 payment_id = 1;
  int64 merchant_id = 2;
  double base_amount = 3;
}

message FeeCalculatedEvent {
  int64 payment_id = 1;
  double fee_amount = 2;
}
