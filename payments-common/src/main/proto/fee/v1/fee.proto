syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.fee";

message CalculateFeeCommand {
  int64 payment_id = 1;
  int64 merchant_id = 2;
  double base_amount = 3;
}

message FeeCalculatedEvent {
  int64 payment_id = 1;
  double fee_amount = 2;
}
