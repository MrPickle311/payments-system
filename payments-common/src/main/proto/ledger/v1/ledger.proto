syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.ledger";

message PostJournalEntryCommand {
  int64 payment_id = 1;
  int64 payer_wallet_id = 2;
  int64 payee_wallet_id = 3;
  double base_amount = 4;
  double fee_amount = 5;
  string currency = 6;
}

message JournalEntryPostedEvent {
  int64 payment_id = 1;
  int64 entry_id = 2;
}
