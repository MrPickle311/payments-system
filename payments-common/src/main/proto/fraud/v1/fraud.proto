syntax = "proto3";

package com.payments.contracts.v1;

option java_multiple_files = true;
option java_package = "com.payments.contracts.v1.fraud";

service FraudService {
  rpc Evaluate (EvaluateFraudRequest) returns (EvaluateFraudResponse);
}

message EvaluateFraudRequest {
  int64 payment_id = 1;
  double amount = 2;
  string currency = 3;
}

message EvaluateFraudResponse {
  int32 score = 1;
  string risk_level = 2;
  string recommendation = 3;
}
