syntax = "proto3";

package com.example.payments.fraud;

option java_multiple_files = true;
option java_package = "com.example.payments.fraud.grpc";

service FraudService {
  rpc CheckFraud (FraudRequest) returns (FraudResponse);
}

message FraudRequest {
  int64 payment_id = 1;
  string amount = 2;
  string currency = 3;
}

message FraudResponse {
  bool success = 1;
  int32 score = 2;
  string risk_level = 3;
  string recommendation = 4;
}
