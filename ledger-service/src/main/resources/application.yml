server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus # Otwiera endpoint /actuator/prometheus
  metrics:
    tags:
      application: ${spring.application.name} # Ułatwi filtrowanie w Grafanie
  tracing:
    sampling:
      probability: 1.0 # 100% zapytań jest śledzonych (na produkcję daje się np. 0.1)
  otlp:
    tracing:
      # Celuje w Tempo w namespace 'monitoring'
      endpoint: http://tempo.monitoring.svc.cluster.local:4318/v1/traces

jdbc:
  datasource-proxy:
    enabled: true

spring:
  application:
    name: ledger-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    com.example.payments: DEBUG
