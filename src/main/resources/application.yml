spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update           # Use 'validate' + Flyway in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.example.payments: DEBUG
    org.springframework.statemachine: WARN  # Set to DEBUG to trace SM internals
