<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="refresh" content="30"/>
    <title>State Machine Monitor — Payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #09090b; --surface: #18181b; --surface2: #27272a;
            --border: #3f3f46; --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.25);
            --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
            --text: #f4f4f5; --text-muted: #a1a1aa; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 60px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
        .nav-brand { font-weight: 700; font-size: 1.2rem; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .nav-brand::before { content: '◎'; font-size: 1.4rem; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--text); }
        .nav-right { margin-left: auto; font-size: 0.8rem; color: var(--text-muted); }
        .container { max-width: 1400px; margin: 0 auto; padding: 2.5rem 2rem; }
        .page-header { margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #f4f4f5, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-weight: 600; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 0.875rem 1.5rem; text-align: left; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(139, 92, 246, 0.05); }
        td { padding: 1rem 1.5rem; font-size: 0.9rem; vertical-align: middle; }
        td a { color: var(--accent); text-decoration: none; font-weight: 500; }
        td a:hover { text-decoration: underline; }
        .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.35rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .badge-COMPLETED, .badge-FRAUD_PASSED, .badge-AUTH_APPROVED { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-FAILED, .badge-FRAUD_DETECTED, .badge-AUTH_REJECTED { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-PROCESSING, .badge-AUTH_PENDING, .badge-FRAUD_EVALUATING { background: rgba(59,130,246,0.15); color: var(--blue); animation: pulse 2s infinite; }
        .badge-NEW { background: rgba(139,92,246,0.15); color: var(--accent); }
        .badge-CANCELED, .badge-REFUNDED { background: rgba(234,179,8,0.15); color: var(--yellow); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .mono { font-family: monospace; font-size: 0.9rem; }
        .empty-state { text-align: center; padding: 4rem; color: var(--text-muted); }
        .pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: flex-end; margin-top: 1.5rem; }
        .page-btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 0.85rem; text-decoration: none; transition: all 0.2s; }
        .page-btn:hover { background: var(--accent); border-color: var(--accent); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/payment-dashboard">StateMonitor</a>
    <a href="/payment-dashboard" class="active">Payments</a>
    <span class="nav-right" id="clock"></span>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Payments Overview</h1>
        <p>Live view of all payments and their current state machine status.</p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Recent Payments</span>
        </div>
        <div th:if="${payments.isEmpty()}" class="empty-state">
            <p>No payments found.</p>
        </div>
        <table th:if="${!payments.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Transaction ID</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Current State</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="payment : ${payments}">
                    <td class="mono" th:text="${payment.id}">1</td>
                    <td class="mono" th:text="${payment.transactionId}">txn_123</td>
                    <td th:text="${payment.amount} + ' ' + ${payment.currency}">10.00 USD</td>
                    <td th:text="${#temporals.format(payment.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-05-08</td>
                    <td>
                        <span class="badge" th:classappend="'badge-' + ${payment.state.split(',')[0]}" th:text="${payment.state}">NEW</span>
                    </td>
                    <td>
                        <a th:href="@{/payment-dashboard/{id}(id=${payment.id})}">View Details &amp; History →</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${totalPages > 1}">
        <a class="page-btn" th:href="@{/payment-dashboard(page=${page - 1})}" th:classappend="${page == 0} ? 'disabled'">← Prev</a>
        <span style="font-size:0.85rem;color:var(--text-muted)" th:text="'Page ' + (${page} + 1) + ' of ' + ${totalPages}"></span>
        <a class="page-btn" th:href="@{/payment-dashboard(page=${page + 1})}" th:classappend="${page + 1 >= totalPages} ? 'disabled'">Next →</a>
    </div>
</div>
<script>
    function tick() { document.getElementById('clock').textContent = new Date().toLocaleString(); }
    tick(); setInterval(tick, 1000);
</script>
</body>
</html>
