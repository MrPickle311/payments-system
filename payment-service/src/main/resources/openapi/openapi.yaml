openapi: 3.0.3
info:
  title: Payment Service API
  version: 1.0.0
paths:
  /api/payments:
    post:
      tags:
        - Payments
      summary: Create a new payment
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
  /api/payments/{id}:
    get:
      tags:
        - Payments
      summary: Get payment by ID
      operationId: getPayment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
  /api/payments/{id}/fee:
    get:
      tags:
        - Fees
      summary: Get payment fee
      operationId: getPaymentFee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentFee'
  /api/payments/{id}/history:
    get:
      tags:
        - Payments
      summary: Get payment history
      operationId: getPaymentHistory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentHistory'
  /api/webhook/payment:
    post:
      tags:
        - Webhook
      summary: Handle payment webhook event
      operationId: handlePaymentEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Event handled successfully
components:
  schemas:
    CreatePaymentRequest:
      type: object
      required:
        - transactionId
        - amount
        - currency
      properties:
        transactionId:
          type: string
        amount:
          type: number
        currency:
          type: string
    Money:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
    Payment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        transactionId:
          type: string
        money:
          $ref: '#/components/schemas/Money'
        state:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaymentFee:
      type: object
      properties:
        id:
          type: integer
          format: int64
        paymentId:
          type: integer
          format: int64
        grossAmount:
          type: number
        percentageFee:
          type: number
        flatFee:
          type: number
        totalFee:
          type: number
        netAmount:
          type: number
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
    PaymentHistory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        paymentId:
          type: integer
          format: int64
        fromState:
          type: string
        toState:
          type: string
        event:
          type: string
        timestamp:
          type: string
          format: date-time
    WebhookPayload:
      type: object
      required:
        - paymentId
        - event
      properties:
        paymentId:
          type: integer
          format: int64
        event:
          type: string
