openapi: 3.0.3
info:
  title: Batch Dashboard API
  version: 1.0.0
paths:
  /batch/jobs:
    get:
      summary: Get all job summaries
      operationId: getJobSummaries
      responses:
        '200':
          description: A list of job summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobSummary'
  /batch/jobs/{jobName}:
    get:
      summary: Get job details
      operationId: getJobDetail
      parameters:
        - name: jobName
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetail'
  /batch/executions/{executionId}:
    get:
      summary: Get execution details
      operationId: getExecutionDetail
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionDetail'
components:
  schemas:
    JobSummary:
      type: object
      properties:
        jobName:
          type: string
        instanceCount:
          type: integer
          format: int64
        lastStatus:
          type: string
        totalExecutions:
          type: integer
    JobDetail:
      type: object
      properties:
        jobName:
          type: string
        instances:
          type: array
          items:
            $ref: '#/components/schemas/JobInstanceDetail'
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer
        totalInstances:
          type: integer
          format: int64
    JobInstanceDetail:
      type: object
      properties:
        instanceId:
          type: integer
          format: int64
        jobName:
          type: string
        latestStatus:
          type: string
        executions:
          type: array
          items:
            $ref: '#/components/schemas/JobExecution'
    JobExecution:
      type: object
      properties:
        id:
          type: integer
          format: int64
        version:
          type: integer
        status:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        exitStatus:
          $ref: '#/components/schemas/ExitStatus'
    ExitStatus:
      type: object
      properties:
        exitCode:
          type: string
        exitDescription:
          type: string
    ExecutionDetail:
      type: object
      properties:
        execution:
          $ref: '#/components/schemas/JobExecution'
        jobInstance:
          $ref: '#/components/schemas/JobInstance'
        parameters:
          type: object
          additionalProperties:
            type: string
        managerSteps:
          type: array
          items:
            $ref: '#/components/schemas/StepDetail'
        partitionSteps:
          type: array
          items:
            $ref: '#/components/schemas/StepDetail'
        hasPartitions:
          type: boolean
        totalRead:
          type: integer
          format: int64
        totalWrite:
          type: integer
          format: int64
        totalSkip:
          type: integer
          format: int64
    JobInstance:
      type: object
      properties:
        id:
          type: integer
          format: int64
        version:
          type: integer
        jobName:
          type: string
    StepDetail:
      type: object
      properties:
        stepName:
          type: string
        status:
          type: string
        exitCode:
          type: string
        readCount:
          type: integer
          format: int64
        writeCount:
          type: integer
          format: int64
        filterCount:
          type: integer
          format: int64
        skipCount:
          type: integer
          format: int64
        commitCount:
          type: integer
          format: int64
        rollbackCount:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        context:
          type: object
          additionalProperties:
            type: string
        durationSeconds:
          type: integer
          format: int64