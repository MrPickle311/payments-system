<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Batch Monitor — ' + ${jobName}">Batch Monitor — Job</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
            --border: #2e3350; --accent: #6366f1; --accent-glow: rgba(99,102,241,0.25);
            --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
            --gray: #6b7280; --text: #e2e8f0; --text-muted: #94a3b8; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-weight: 700; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
        .nav-brand::before { content: '⬡ '; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
        nav a:hover { color: var(--text); }
        .nav-right { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .page-header { margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 0.75rem; }
        .page-header h1 code { font-size: 1.2rem; color: var(--accent); background: rgba(99,102,241,0.1); padding: 0.1rem 0.5rem; border-radius: 6px; }
        .page-header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
        .card-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-weight: 600; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 0.625rem 1rem; text-align: left; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(99,102,241,0.05); }
        td { padding: 0.75rem 1rem; font-size: 0.875rem; vertical-align: middle; }
        td a { color: var(--accent); text-decoration: none; font-weight: 500; }
        td a:hover { text-decoration: underline; }
        .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .badge-COMPLETED  { background: rgba(34,197,94,0.15);  color: #22c55e; }
        .badge-FAILED     { background: rgba(239,68,68,0.15);   color: #ef4444; }
        .badge-STARTED    { background: rgba(99,102,241,0.15);  color: #6366f1; animation: pulse 2s infinite; }
        .badge-STOPPED    { background: rgba(245,158,11,0.15);  color: #f59e0b; }
        .badge-UNKNOWN, .badge-NEVER_RUN { background: rgba(107,114,128,0.15); color: #6b7280; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .mono { font-family: monospace; font-size: 0.8rem; }
        .instance-group { background: var(--surface2); border-radius: 8px; margin-bottom: 1rem; border: 1px solid var(--border); overflow: hidden; }
        .instance-header { padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
        .instance-header:hover { background: rgba(99,102,241,0.05); }
        .instance-id { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .instance-id span { color: var(--accent); margin-left: 4px; }
        .exec-row { display: grid; grid-template-columns: 60px 1fr auto auto auto; align-items: center; gap: 1rem; padding: 0.625rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .exec-row:last-child { border-bottom: none; }
        .exec-row:hover { background: rgba(99,102,241,0.04); }
        .exec-id { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); }
        .exec-time { font-size: 0.75rem; color: var(--text-muted); }
        .exec-link { color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: 500; white-space: nowrap; }
        .exec-link:hover { text-decoration: underline; }
        .pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: flex-end; margin-top: 1rem; }
        .page-btn { padding: 0.375rem 0.875rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 0.8rem; text-decoration: none; transition: background 0.2s; }
        .page-btn:hover { background: var(--accent); border-color: var(--accent); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/batch">BatchMonitor</a>
    <a href="/batch">Dashboard</a>
    <a href="#" th:text="${jobName}" style="color:var(--text)"></a>
    <span class="nav-right" id="clock"></span>
</nav>
<div class="container">
    <div class="breadcrumb">
        <a href="/batch">Dashboard</a>
        <span>›</span>
        <span th:text="${jobName}">job</span>
    </div>

    <div class="page-header">
        <h1>Job: <code th:text="${jobName}">exportLedgerJob</code></h1>
        <p th:text="${totalInstances} + ' total instances across all runs'">0 instances</p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Job Instances &amp; Executions</span>
            <span style="font-size:0.75rem;color:var(--text-muted)" th:text="'Page ' + (${page}+1) + ' of ' + ${totalPages}"></span>
        </div>

        <div th:if="${instances.isEmpty()}" class="empty-state">
            <p>No instances found for this job.</p>
        </div>

        <div th:each="instance : ${instances}" class="instance-group">
            <div class="instance-header">
                <span class="instance-id">Instance<span th:text="${instance.instanceId}">#</span></span>
                <span class="badge"
                      th:classappend="'badge-' + ${instance.latestStatus}"
                      th:text="${instance.latestStatus}">STATUS</span>
                <span style="flex:1"></span>
                <span style="font-size:0.75rem;color:var(--text-muted)"
                      th:text="${instance.executions.size()} + ' execution(s)'"></span>
            </div>

            <div th:each="exec : ${instance.executions}" class="exec-row">
                <span class="exec-id" th:text="'#' + ${exec.id}">#1</span>
                <div>
                    <div th:text="${exec.jobParameters.parameters.isEmpty() ? '(no parameters)' : ''}" style="font-size:0.75rem;color:var(--text-muted)"></div>
                    <div th:each="jobParam : ${exec.jobParameters.parameters}" style="font-size:0.72rem;color:var(--text-muted);font-family:monospace">
                        <span th:text="${jobParam.key}" style="color:var(--accent)"></span>=<span th:text="${jobParam.value}"></span>
                    </div>
                </div>
                <span class="badge"
                      th:classappend="'badge-' + ${exec.status}"
                      th:text="${exec.status}">STATUS</span>
                <span class="exec-time" th:text="${exec.startTime != null ? #temporals.format(exec.startTime, 'yyyy-MM-dd HH:mm:ss') : '—'}"></span>
                <a class="exec-link" th:href="@{/batch/executions/{id}(id=${exec.id})}">Inspect →</a>
            </div>
        </div>

        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-btn"
               th:href="@{/batch/jobs/{name}(name=${jobName},page=${page - 1})}"
               th:classappend="${page == 0} ? 'disabled'">← Prev</a>
            <span style="font-size:0.8rem;color:var(--text-muted)"
                  th:text="${page + 1} + ' / ' + ${totalPages}"></span>
            <a class="page-btn"
               th:href="@{/batch/jobs/{name}(name=${jobName},page=${page + 1})}"
               th:classappend="${page + 1 >= totalPages} ? 'disabled'">Next →</a>
        </div>
    </div>
</div>
<script>
    function tick() { document.getElementById('clock').textContent = new Date().toLocaleString(); }
    tick(); setInterval(tick, 1000);
</script>
</body>
</html>
