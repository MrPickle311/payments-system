<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Batch Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style th:fragment="styles">
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.25);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #3b82f6;
            --gray: #6b7280;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .nav-brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-brand::before { content: '⬡'; font-size: 1.3rem; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: var(--text); }
        .nav-right { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); }

        /* LAYOUT */
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: var(--text-muted); }

        /* STATS ROW */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
        .stat-value.accent { color: var(--accent); }

        /* CARDS / TABLES */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-title { font-weight: 600; font-size: 0.9rem; }
        .card-body { padding: 1.5rem; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 0.625rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(99,102,241,0.05); }
        td { padding: 0.875rem 1rem; font-size: 0.875rem; vertical-align: middle; }
        td a { color: var(--accent); text-decoration: none; font-weight: 500; }
        td a:hover { text-decoration: underline; }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .badge.COMPLETED  { background: rgba(34,197,94,0.15);  color: var(--green); }
        .badge.FAILED     { background: rgba(239,68,68,0.15);   color: var(--red); }
        .badge.STARTED    { background: rgba(99,102,241,0.15);  color: var(--accent); animation: pulse 2s infinite; }
        .badge.STARTING   { background: rgba(99,102,241,0.15);  color: var(--accent); }
        .badge.STOPPED    { background: rgba(245,158,11,0.15);  color: var(--yellow); }
        .badge.UNKNOWN    { background: rgba(107,114,128,0.15); color: var(--gray); }
        .badge.NEVER_RUN  { background: rgba(107,114,128,0.15); color: var(--gray); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* PARTITION GRID */
        .partition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.75rem;
        }
        .partition-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            transition: border-color 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }
        .partition-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .partition-card.COMPLETED::before { background: var(--green); }
        .partition-card.FAILED::before    { background: var(--red); }
        .partition-card.STARTED::before   { background: var(--accent); }
        .partition-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .partition-name { font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; font-family: monospace; }
        .partition-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem; margin-top: 0.5rem; }
        .metric-item { display: flex; flex-direction: column; }
        .metric-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .metric-val   { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .metric-val.green { color: var(--green); }
        .metric-val.red   { color: var(--red); }
        .partition-ctx { margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
        .ctx-entry { font-size: 0.7rem; color: var(--text-muted); display: flex; justify-content: space-between; margin-top: 0.2rem; }
        .ctx-key   { color: var(--text-muted); }
        .ctx-val   { color: var(--text); font-weight: 500; font-family: monospace; }

        /* PROGRESS BAR */
        .progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 4px; }
        .progress-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.3s; }

        /* DETAIL GRID */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
        .detail-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-muted); }
        .detail-val   { font-weight: 500; font-family: monospace; font-size: 0.8rem; }

        /* PARAMS */
        .param-table td:first-child { font-family: monospace; color: var(--accent); font-size: 0.8rem; width: 40%; }
        .param-table td:last-child  { font-family: monospace; font-size: 0.8rem; }

        /* PAGINATION */
        .pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: flex-end; margin-top: 1rem; }
        .page-btn {
            padding: 0.375rem 0.875rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.8rem;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .page-btn:hover { background: var(--accent); border-color: var(--accent); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* SECTION TITLE */
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin: 1.5rem 0 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state p { font-size: 0.9rem; }

        /* STEP STATUS ROW COLORING */
        tr.step-COMPLETED td:first-child { border-left: 3px solid var(--green); }
        tr.step-FAILED    td:first-child { border-left: 3px solid var(--red); }
        tr.step-STARTED   td:first-child { border-left: 3px solid var(--accent); }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/batch">BatchMonitor</a>
    <a href="/batch" class="active">Dashboard</a>
    <span class="nav-right" id="clock"></span>
</nav>
<div class="container" th:fragment="layout">
    <th:block th:replace="${fragment}"></th:block>
</div>
<script>
    function tick() {
        document.getElementById('clock').textContent = new Date().toLocaleString();
    }
    tick();
    setInterval(tick, 1000);
</script>
</body>
</html>
